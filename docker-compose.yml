services:
  nginx:
    image: nginx:stable-alpine
    container_name: nustpulse-nginx
    ports:
      - "80:80"
    volumes:
      - ./nustpulse_frontend/docker/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - nustpulse-network

  backend:
    build:
      context: ./nustpulse_backend
      dockerfile: docker/Dockerfile
    container_name: nustpulse-backend
    env_file:
      - ./nustpulse_backend/.env
    depends_on:
      - redis
    networks:
      - nustpulse-network

  frontend:
    build:
      context: ./nustpulse_frontend
      dockerfile: docker/Dockerfile
    container_name: nustpulse-frontend
    networks:
      - nustpulse-network

  redis:
    image: redis:alpine
    container_name: nustpulse-redis
    networks:
      - nustpulse-network

  worker:
    build:
      context: ./nustpulse_backend
      dockerfile: docker/Dockerfile
    container_name: nustpulse-worker
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ./nustpulse_backend/.env
    depends_on:
      - redis
    networks:
      - nustpulse-network

  beat:
    build:
      context: ./nustpulse_backend
      dockerfile: docker/Dockerfile
    container_name: nustpulse-beat
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - ./nustpulse_backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

# Volumes for persistent data if any (not needed for Supabase)
