services:
  nginx:
    image: nginx:stable-alpine
    container_name: loadalert-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./loadalert_backend
      dockerfile: ./docker/Dockerfile
    container_name: loadalert-backend
    env_file:
      - ./loadalert_backend/.env
    # No ports exposed directly, handled by Nginx
    restart: unless-stopped

  frontend:
    build:
      context: ./loadalert_frontend
      dockerfile: ./docker/Dockerfile
    container_name: loadalert-frontend
    env_file:
      - ./loadalert_frontend/.env
    # No ports exposed directly, handled by Nginx
    restart: unless-stopped

# Volumes for persistent data if any (not needed for Supabase)
